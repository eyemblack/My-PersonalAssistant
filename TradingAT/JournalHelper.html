<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading Journal Helper 🚀</title>
    <style>
        :root {
            --primary: #2563eb;
            --secondary: #64748b;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
            --accent: #10b981;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            max-width: 800px;
            width: 100%;
            background: var(--card);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }
        h1 { text-align: center; color: var(--primary); margin-bottom: 30px; }
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 10px;
        }
        .tab-btn {
            padding: 10px 20px;
            border: none;
            background: none;
            cursor: pointer;
            font-weight: 600;
            color: var(--secondary);
            border-radius: 6px;
        }
        .tab-btn.active {
            background: var(--primary);
            color: white;
        }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: 600; margin-bottom: 5px; }
        input, textarea, select {
            width: 100%;
            padding: 10px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 14px;
        }
        textarea { height: 80px; resize: vertical; }
        .btn-save {
            width: 100%;
            padding: 12px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
            transition: opacity 0.2s;
        }
        .btn-save:hover { opacity: 0.9; }
        .form-section { display: none; }
        .form-section.active { display: block; }
    </style>
</head>
<body>

<div class="container">
    <h1>📝 Journal Helper</h1>
    
    <div class="tabs">
        <button class="tab-btn active" onclick="showTab('learning')">1. Learning</button>
        <button class="tab-btn" onclick="showTab('trading')">2. Trading</button>
        <button class="tab-btn" onclick="showTab('reflection')">3. Reflection</button>
    </div>

    <!-- Section 1: Learning -->
    <div id="learning" class="form-section active">
        <div class="form-group">
            <label>วันที่</label>
            <input type="date" id="l-date">
        </div>
        <div class="form-group">
            <label>หัวข้อที่เรียน</label>
            <input type="text" id="l-topic" placeholder="เช่น Market Structure, Spread">
        </div>
        <div class="form-group">
            <label>สิ่งที่เข้าใจ (สรุปสั้นๆ)</label>
            <textarea id="l-understand" placeholder="สรุปสิ่งที่คุณได้รับจากบทเรียน"></textarea>
        </div>
        <div class="form-group">
            <label>จุดที่ยังสงสัย (ถาม Mentor)</label>
            <textarea id="l-question" placeholder="มีอะไรที่อยากให้ Mentor อธิบายเพิ่มไหม?"></textarea>
        </div>
        <div class="form-group">
            <label>Action Item</label>
            <textarea id="l-action" placeholder="สิ่งที่จะไปลองทำต่อในกราฟ"></textarea>
        </div>
        <button class="btn-save" onclick="saveData('learning')">บันทึกเป็น Text File</button>
    </div>

    <!-- Section 2: Trading -->
    <div id="trading" class="form-section">
        <div class="form-group">
            <label>วันที่/เวลา</label>
            <input type="datetime-local" id="t-time">
        </div>
        <div class="form-group">
            <label>คู่เทรด</label>
            <input type="text" id="t-pair" placeholder="เช่น BTC/USDT">
        </div>
        <div class="form-group">
            <label>ทิศทาง</label>
            <select id="t-dir">
                <option value="Long">Long (ซื้อ)</option>
                <option value="Short">Short (ขาย)</option>
            </select>
        </div>
        <div class="form-group">
            <label>เหตุผลที่เข้า (Setup)</label>
            <textarea id="t-setup" placeholder="ใช้เทคนิคอะไร? เช่น FVG + OB"></textarea>
        </div>
        <div class="form-group">
            <label>ความเสี่ยง (%)</label>
            <input type="number" id="t-risk" value="1" step="0.1">
        </div>
        <div class="form-group">
            <label>ผลลัพธ์ (R)</label>
            <input type="text" id="t-result" placeholder="เช่น +2R หรือ -1R">
        </div>
        <div class="form-group">
            <label>บทเรียน/อารมณ์</label>
            <textarea id="t-lesson" placeholder="ตอนเทรดรู้สึกอย่างไร? ได้เรียนรู้อะไร?"></textarea>
        </div>
        <button class="btn-save" onclick="saveData('trading')">บันทึกเป็น Text File</button>
    </div>

    <!-- Section 3: Reflection -->
    <div id="reflection" class="form-section">
        <div class="form-group">
            <label>Win Rate รายสัปดาห์ (%)</label>
            <input type="number" id="r-winrate">
        </div>
        <div class="form-group">
            <label>ข้อผิดพลาดที่พบบ่อย</label>
            <textarea id="r-mistake"></textarea>
        </div>
        <div class="form-group">
            <label>สิ่งที่ทำได้ดี</label>
            <textarea id="r-good"></textarea>
        </div>
        <div class="form-group">
            <label>เป้าหมายสัปดาห์หน้า</label>
            <textarea id="r-goal"></textarea>
        </div>
        <button class="btn-save" onclick="saveData('reflection')">บันทึกเป็น Text File</button>
    </div>
</div>

<script>
    function showTab(tabId) {
        document.querySelectorAll('.form-section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        event.currentTarget.classList.add('active');
    }

    function saveData(type) {
        let content = `--- JOURNAL ENTRY [${type.toUpperCase()}] ---\n`;
        const now = new Date().toISOString().split('T')[0];
        
        if (type === 'learning') {
            content += `Date: ${document.getElementById('l-date').value}\n`;
            content += `Topic: ${document.getElementById('l-topic').value}\n`;
            content += `Understand: ${document.getElementById('l-understand').value}\n`;
            content += `Question: ${document.getElementById('l-question').value}\n`;
            content += `Action: ${document.getElementById('l-action').value}\n`;
        } else if (type === 'trading') {
            content += `Time: ${document.getElementById('t-time').value}\n`;
            content += `Pair: ${document.getElementById('t-pair').value}\n`;
            content += `Direction: ${document.getElementById('t-dir').value}\n`;
            content += `Setup: ${document.getElementById('t-setup').value}\n`;
            content += `Risk: ${document.getElementById('t-risk').value}%\n`;
            content += `Result: ${document.getElementById('t-result').value}\n`;
            content += `Lesson: ${document.getElementById('t-lesson').value}\n`;
        } else if (type === 'reflection') {
            content += `WinRate: ${document.getElementById('r-winrate').value}%\n`;
            content += `Mistake: ${document.getElementById('r-mistake').value}\n`;
            content += `Good: ${document.getElementById('r-good').value}\n`;
            content += `Goal: ${document.getElementById('r-goal').value}\n`;
        }

        const blob = new Blob([content], { type: 'text/plain' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `journal_${type}_${now}.txt`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
    }

    // Set default date to today
    document.getElementById('l-date').valueAsDate = new Date();
    document.getElementById('t-time').value = new Date().toISOString().slice(0, 16);
</script>

</body>
</html>
